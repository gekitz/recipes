<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Georgs Rezepte 🍽️</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f5f0; color: #2d2d2d; }
    header { background: linear-gradient(135deg, #e8603c, #d44f2b); color: white; padding: 2rem; text-align: center; }
    header h1 { font-size: 2.2rem; font-weight: 700; }
    header p { opacity: 0.9; margin-top: 0.3rem; font-size: 1rem; }
    .filter-bar { background: white; padding: 1rem 1.5rem; display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .filter-bar label { font-weight: 600; font-size: 0.85rem; color: #666; margin-right: 0.5rem; }
    .search-box { flex: 1; min-width: 200px; padding: 0.4rem 0.8rem; border: 1.5px solid #ddd; border-radius: 20px; font-size: 0.9rem; outline: none; }
    .search-box:focus { border-color: #e8603c; }
    .filter-btn { padding: 0.35rem 0.8rem; border: 1.5px solid #ddd; border-radius: 20px; background: white; cursor: pointer; font-size: 0.82rem; transition: all 0.15s; white-space: nowrap; }
    .filter-btn:hover { border-color: #e8603c; color: #e8603c; }
    .filter-btn.active { background: #e8603c; border-color: #e8603c; color: white; }
    .filter-btn .count { opacity: 0.7; font-size: 0.75rem; }
    .btn-all { font-weight: 600; }
    .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }
    .stats { text-align: center; color: #888; font-size: 0.9rem; margin-bottom: 1.5rem; }
    .stats span { font-weight: 600; color: #e8603c; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1.2rem; }
    .recipe-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.07); transition: transform 0.15s, box-shadow 0.15s; }
    .recipe-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.12); }
    .recipe-card.hidden { display: none; }

    /* Instagram embed at top of card */
    .embed-wrap { width: 100%; background: #fafafa; }
    .embed-wrap iframe { width: 100%; min-height: 400px; border: none; display: block; }

    .card-header { padding: 1.1rem 1.2rem 0.8rem; }
    .card-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.4rem; }
    .owner { color: #e8603c; font-size: 0.82rem; font-weight: 600; text-decoration: none; }
    .owner:hover { text-decoration: underline; }
    .ig-link { font-size: 0.78rem; color: #888; text-decoration: none; padding: 0.2rem 0.6rem; border: 1px solid #eee; border-radius: 12px; transition: all 0.15s; }
    .ig-link:hover { border-color: #e8603c; color: #e8603c; }
    .recipe-title { font-size: 1rem; font-weight: 600; line-height: 1.35; margin-bottom: 0.6rem; color: #1a1a1a; }
    .tags { display: flex; flex-wrap: wrap; gap: 0.3rem; }
    .tag { font-size: 0.72rem; padding: 0.2rem 0.55rem; border-radius: 10px; font-weight: 500; }
    .tag-main { background: #fef3e2; color: #c0620a; }
    .tag-salad { background: #e8f5e9; color: #2e7d32; }
    .tag-bread { background: #fff3e0; color: #e65100; }
    .tag-dessert { background: #fce4ec; color: #c2185b; }
    .tag-vegan { background: #e8f5e9; color: #1b5e20; }
    .tag-vegetarian { background: #f3e5f5; color: #6a1b9a; }
    .tag-quick { background: #e3f2fd; color: #1565c0; }

    /* Collapsible sections */
    .card-body { padding: 0 1.2rem 1rem; border-top: 1px solid #f5f5f5; }
    .section-details { margin-top: 0.7rem; }
    .section-summary { font-size: 0.82rem; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; padding: 0.45rem 0.6rem; border-radius: 6px; background: #f8f5f0; list-style: none; display: flex; align-items: center; gap: 0.4rem; user-select: none; }
    .section-summary::-webkit-details-marker { display: none; }
    .section-summary::before { content: "▶"; font-size: 0.6rem; color: #bbb; transition: transform 0.2s; display: inline-block; }
    details[open] .section-summary::before { transform: rotate(90deg); }
    .section-summary:hover { background: #f0ede8; color: #e8603c; }
    .section-count { color: #aaa; font-weight: 400; text-transform: none; letter-spacing: 0; }
    .section-details ul, .section-details ol { padding: 0.6rem 0 0.2rem 1.5rem; }
    .section-details li { font-size: 0.87rem; line-height: 1.5; color: #444; margin-bottom: 0.2rem; }

    .no-results { text-align: center; padding: 4rem; color: #888; grid-column: 1/-1; }
    .loading { text-align: center; padding: 4rem; color: #888; font-size: 1.1rem; }
    .sort-btn { padding: 0.35rem 0.8rem; border: 1.5px solid #ddd; border-radius: 20px; background: white; cursor: pointer; font-size: 0.82rem; transition: all 0.15s; white-space: nowrap; margin-left: auto; }
    .sort-btn:hover { border-color: #e8603c; color: #e8603c; }
    .sort-btn.active { background: #e8603c; border-color: #e8603c; color: white; }
    .date-badge { font-size: 0.7rem; color: #bbb; margin-top: 0.3rem; }
    @media (max-width: 600px) {
      header h1 { font-size: 1.6rem; }
      .grid { grid-template-columns: 1fr; }
      .filter-bar { padding: 0.8rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Georgs Rezepte 🍽️</h1>
    <p>Gesammelte Instagram-Rezepte von Georg und Katja</p>
  </header>

  <div class="filter-bar" id="filter-bar">
    <label>Filter:</label>
    <input class="search-box" type="search" placeholder="🔍 Rezept suchen..." id="search-input">
    <button class="sort-btn active" id="sort-btn" title="Sortierung umschalten">🕐 Neueste zuerst</button>
  </div>

  <div class="container">
    <div class="stats" id="stats"></div>
    <div class="grid" id="recipe-grid">
      <div class="loading">Rezepte werden geladen…</div>
    </div>
  </div>

  <script>
    const TAG_META = {
      main:       { label: '🍽️ Hauptgericht', cls: 'tag-main' },
      salad:      { label: '🥗 Salat',         cls: 'tag-salad' },
      bread:      { label: '🍞 Brot & Gebäck', cls: 'tag-bread' },
      dessert:    { label: '🍰 Dessert',        cls: 'tag-dessert' },
      vegan:      { label: '🌱 Vegan',          cls: 'tag-vegan' },
      vegetarian: { label: '🧆 Vegetarisch',   cls: 'tag-vegetarian' },
      quick:      { label: '⚡ Schnell',        cls: 'tag-quick' },
    };

    let allRecipes = [];
    let activeTag = 'all';
    let sortNewest = true;

    function ownerHandle(raw) {
      // raw may be "@burger.world" or "burger.world"
      return raw ? raw.replace(/^@/, '') : '';
    }

    function buildCard(r) {
      const code = r.code || '';
      const igUrl = r.url || `https://www.instagram.com/p/${code}/`;
      const handle = ownerHandle(r.owner || r.author || '');
      const ownerUrl = handle ? `https://www.instagram.com/${handle}/` : '#';
      const title = r.title || r.name || code;
      const tags = r.tags || [];
      const ingredients = r.ingredients || [];
      const steps = r.preparation || r.steps || [];
      const hasDetails = ingredients.length > 0 || steps.length > 0;

      const dateSaved = r.date_saved || '';

      const tagsHtml = tags.map(t => {
        const meta = TAG_META[t];
        return meta
          ? `<span class="tag ${meta.cls}">${meta.label}</span>`
          : `<span class="tag">${t}</span>`;
      }).join('');

      const ingredientsHtml = ingredients.length > 0
        ? `<details class="section-details">
             <summary class="section-summary">Zutaten <span class="section-count">(${ingredients.length})</span></summary>
             <ul>${ingredients.map(i => `<li>${i}</li>`).join('')}</ul>
           </details>`
        : '';

      const stepsHtml = steps.length > 0
        ? `<details class="section-details">
             <summary class="section-summary">Zubereitung <span class="section-count">(${steps.length} Schritte)</span></summary>
             <ol>${steps.map(s => `<li>${s}</li>`).join('')}</ol>
           </details>`
        : '';

      return `<div class="recipe-card ${hasDetails ? 'has-details' : ''}" data-tags="${tags.join(' ')}" data-code="${code}" data-date="${dateSaved}" data-title="${title.toLowerCase()} ${handle.toLowerCase()}">
        <div class="embed-wrap"><iframe src="https://www.instagram.com/p/${code}/embed/" allowtransparency="true" scrolling="no" frameborder="0" loading="lazy" allowfullscreen></iframe></div>
        <div class="card-header">
          <div class="card-meta">
            <a class="owner" href="${ownerUrl}" target="_blank">@${handle}</a>
            <a class="ig-link" href="${igUrl}" target="_blank">📸 Post</a>
          </div>
          <h3 class="recipe-title">${title}</h3>
          <div class="tags">${tagsHtml}</div>
          ${dateSaved ? `<div class="date-badge">📅 Hinzugefügt ${dateSaved}</div>` : ''}
        </div>
        ${hasDetails ? `<div class="card-body">${ingredientsHtml}${stepsHtml}</div>` : ''}
      </div>`;
    }

    function buildFilterButtons(recipes) {
      const counts = {};
      recipes.forEach(r => (r.tags || []).forEach(t => { counts[t] = (counts[t] || 0) + 1; }));

      const bar = document.getElementById('filter-bar');
      const search = bar.querySelector('#search-input');

      // All button
      const allBtn = document.createElement('button');
      allBtn.className = 'filter-btn btn-all active';
      allBtn.dataset.tag = 'all';
      allBtn.innerHTML = `Alle <span class="count">(${recipes.length})</span>`;
      bar.insertBefore(allBtn, search);

      // Tag buttons in defined order
      Object.entries(TAG_META).forEach(([tag, meta]) => {
        if (!counts[tag]) return;
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.dataset.tag = tag;
        btn.innerHTML = `${meta.label} <span class="count">(${counts[tag]})</span>`;
        bar.insertBefore(btn, search);
      });

      bar.addEventListener('click', e => {
        const btn = e.target.closest('.filter-btn');
        if (!btn) return;
        bar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeTag = btn.dataset.tag;
        applyFilter();
      });

      // Sort button
      document.getElementById('sort-btn').addEventListener('click', function() {
        sortNewest = !sortNewest;
        this.textContent = sortNewest ? '🕐 Neueste zuerst' : '🕐 Älteste zuerst';
        this.classList.toggle('active', sortNewest);
        renderCards();
        applyFilter();
      });
    }

    function renderCards() {
      const sorted = [...allRecipes].sort((a, b) => {
        const da = a.date_saved || '0000-00-00';
        const db = b.date_saved || '0000-00-00';
        if (da === db) return sortNewest ? b.index - a.index : a.index - b.index;
        return sortNewest ? db.localeCompare(da) : da.localeCompare(db);
      });
      document.getElementById('recipe-grid').innerHTML = sorted.map(buildCard).join('');
    }

    function applyFilter() {
      const q = document.getElementById('search-input').value.toLowerCase();
      const cards = document.querySelectorAll('.recipe-card');
      let visible = 0;
      cards.forEach(card => {
        const tags = card.dataset.tags || '';
        const text = (card.dataset.title || '') + ' ' + tags + ' ' + card.textContent.toLowerCase();
        const tagMatch = activeTag === 'all' || tags.split(' ').includes(activeTag);
        const queryMatch = !q || text.includes(q);
        const show = tagMatch && queryMatch;
        card.classList.toggle('hidden', !show);
        if (show) visible++;
      });
      document.getElementById('stats').innerHTML =
        `Zeige <span id="visible-count">${visible}</span> von <span>${allRecipes.length}</span> Rezepten`;
    }

    async function init() {
      try {
        const res = await fetch('recipes_data.json');
        allRecipes = await res.json();
        buildFilterButtons(allRecipes);
        renderCards();
        document.getElementById('stats').innerHTML =
          `Zeige <span id="visible-count">${allRecipes.length}</span> von <span>${allRecipes.length}</span> Rezepten`;
        document.getElementById('search-input').addEventListener('input', applyFilter);
      } catch (e) {
        document.getElementById('recipe-grid').innerHTML =
          `<div class="no-results">Fehler beim Laden der Rezepte: ${e.message}</div>`;
      }
    }

    init();
  </script>
</body>
</html>
