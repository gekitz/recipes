<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Georg &amp; Katja's Rezeptsammlung</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; background:linear-gradient(135deg,#f5f7fa 0%,#c3cfe2 100%); min-height:100vh; padding:20px; color:#333; }
.container { max-width:1400px; margin:0 auto; }
.header { text-align:center; margin-bottom:40px; background:white; padding:40px 20px; border-radius:15px; box-shadow:0 5px 15px rgba(0,0,0,.1); }
.header h1 { color:#4a7c59; font-size:2.5em; margin-bottom:10px; }
.header p { color:#666; font-size:1.1em; }
.controls { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:30px; justify-content:center; background:white; padding:20px; border-radius:15px; box-shadow:0 5px 15px rgba(0,0,0,.1); }
.search-box { flex:1; min-width:250px; padding:12px 20px; border:2px solid #4a7c59; border-radius:8px; font-size:1em; transition:all .3s; }
.search-box:focus { outline:none; box-shadow:0 0 10px rgba(74,124,89,.3); background:#f9faf8; }
.category-filters { display:flex; flex-wrap:wrap; gap:10px; }
.filter-btn { padding:10px 15px; background:#f0f0f0; color:#333; border:2px solid #ddd; border-radius:8px; cursor:pointer; font-weight:500; transition:all .3s; }
.filter-btn:hover { border-color:#4a7c59; background:#f9faf8; }
.filter-btn.active { background:#4a7c59; color:white; border-color:#4a7c59; }
.recipe-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(350px,1fr)); gap:25px; margin-bottom:40px; }
.card { background:white; border-radius:15px; overflow:hidden; box-shadow:0 5px 20px rgba(0,0,0,.1); transition:all .3s; display:flex; flex-direction:column; }
.card:hover { transform:translateY(-5px); box-shadow:0 10px 30px rgba(74,124,89,.2); }
.card-header { background:linear-gradient(135deg,#4a7c59 0%,#5a9c75 100%); color:white; padding:20px; border-bottom:5px solid #3a5c47; }
.card-title { font-size:1.5em; font-weight:bold; margin-bottom:8px; }
.card-owner { font-size:.9em; opacity:.9; display:flex; align-items:center; gap:5px; }
.card-tags { display:flex; flex-wrap:wrap; gap:5px; margin-top:10px; }
.tag { background:rgba(255,255,255,.3); padding:4px 10px; border-radius:20px; font-size:.8em; display:inline-block; }
.card-embed { padding:0 16px 12px; }
.card-embed iframe { width:100%; height:480px; border:1px solid #eee; border-radius:8px; }
.details-toggle { padding:10px 16px; background:linear-gradient(135deg,#4a7c59 0%,#5a9c75 100%); color:white; border:none; border-radius:8px; cursor:pointer; font-size:.9em; font-weight:600; width:calc(100% - 40px); margin:0 20px 16px; transition:opacity .2s; }
.details-toggle:hover { opacity:.85; }
.details-body { display:none; }
.details-body.open { display:block; }
.card-content { padding:20px; flex:1; display:flex; flex-direction:column; }
.section { margin-bottom:15px; }
.section-title { color:#4a7c59; font-weight:bold; font-size:1.1em; margin-bottom:8px; display:flex; align-items:center; gap:5px; }
.ingredient-list, .preparation-list { list-style:none; padding-left:0; }
.ingredient-list li, .preparation-list li { padding:5px 0; padding-left:20px; position:relative; }
.ingredient-list li:before { content:"\2022"; color:#4a7c59; font-weight:bold; position:absolute; left:0; }
.preparation-list li:before { content:"\2192"; color:#4a7c59; position:absolute; left:0; }
.hidden { display:none !important; }
.footer { text-align:center; padding:20px; color:#666; font-size:.9em; }
.loading { text-align:center; padding:60px; color:#4a7c59; font-size:1.3em; }
@media (max-width:768px) { .recipe-grid { grid-template-columns:1fr; } .header h1 { font-size:1.8em; } .controls { flex-direction:column; } .search-box { width:100%; } .category-filters { width:100%; justify-content:center; } }
</style>
</head>
<body>
<div class="container">
<div class="header"><h1>Georg &amp; Katja's Rezeptsammlung</h1><p id="subtitle">Lade Rezepte...</p></div>
<div class="controls"><input type="text" id="searchInput" class="search-box" placeholder="Rezepte durchsuchen..."><div class="category-filters" id="categoryFilters"></div></div>
<div class="recipe-grid" id="recipeGrid"><div class="loading">Lade Rezepte...</div></div>
<div class="footer"><p>Insgesamt: <span id="recipeCount">0</span> Rezepte</p></div>
</div>
<script>
const catNames={main:"Hauptgerichte",salad:"Salate",bread:"Brot",dessert:"Dessert",vegan:"Vegan",vegetarian:"Vegetarisch",quick:"Schnell"};
const filters={search:"",category:"all"};
let allRecipes=[];
function initFilters(){const c=document.getElementById("categoryFilters");const counts={};allRecipes.forEach(r=>r.tags.forEach(t=>counts[t]=(counts[t]||0)+1));let h='<button class="filter-btn active" onclick="setFilter(\'all\',this)">Alle ('+allRecipes.length+')</button>';Object.keys(catNames).forEach(k=>{if(counts[k])h+='<button class="filter-btn" onclick="setFilter(\''+k+'\',this)">'+(catNames[k]||k)+' ('+counts[k]+')</button>';});c.innerHTML=h;}
function setFilter(cat,btn){document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");filters.category=cat;filterRecipes();}
function filterRecipes(){const q=filters.search.toLowerCase();let v=0;document.querySelectorAll(".card").forEach(card=>{const t=card.textContent.toLowerCase();const tags=card.dataset.tags||"";const mS=!q||t.includes(q);const mC=filters.category==="all"||tags.split(",").includes(filters.category);card.classList.toggle("hidden",!(mS&&mC));if(mS&&mC)v++;});document.getElementById("recipeCount").textContent=v;}
document.getElementById("searchInput").addEventListener("input",e=>{filters.search=e.target.value;filterRecipes();});
function createCard(r){const card=document.createElement("div");card.className="card";card.dataset.tags=r.tags.join(",");
let ingH="";if(r.ingredients&&r.ingredients.length>0&&!(r.ingredients.length===1&&r.ingredients[0].toLowerCase().includes("recipe"))){ingH='<div class="section"><div class="section-title">Zutaten</div><ul class="ingredient-list">'+r.ingredients.map(i=>"<li>"+i+"</li>").join("")+"</ul></div>";}
let prepH="";if(r.preparation&&r.preparation.length>0&&!(r.preparation.length===1&&r.preparation[0].toLowerCase().includes("instagram"))){prepH='<div class="section"><div class="section-title">Zubereitung</div><ol class="preparation-list">'+r.preparation.map(s=>"<li>"+s+"</li>").join("")+"</ol></div>";}
const hasDet=ingH!==""||prepH!=="";
const detBtn=hasDet?'<button class="details-toggle" onclick="let b=this.nextElementSibling;b.classList.toggle(\'open\');this.textContent=b.classList.contains(\'open\')?\'▲ Details ausblenden\':\'📋 Details anzeigen\'">📋 Details anzeigen</button>':"";
card.innerHTML='<div class="card-header"><div class="card-title">'+r.title+'</div><div class="card-owner">'+r.owner+'</div><div class="card-tags">'+r.tags.map(t=>'<span class="tag">'+(catNames[t]||t)+'</span>').join("")+'</div></div><div class="card-embed"><iframe src="https://www.instagram.com/p/'+r.code+'/embed/" frameborder="0" scrolling="no" allowtransparency="true" loading="lazy"></iframe></div>'+detBtn+'<div class="details-body"><div class="card-content">'+ingH+prepH+'</div></div>';
return card;}
function render(){const grid=document.getElementById("recipeGrid");grid.innerHTML="";allRecipes.forEach(r=>grid.appendChild(createCard(r)));}
fetch("recipes_data.json").then(r=>r.json()).then(data=>{allRecipes=data;document.getElementById("subtitle").textContent="Eine kuratierte Sammlung von "+data.length+" Rezepten von Instagram";document.getElementById("recipeCount").textContent=data.length;initFilters();render();}).catch(e=>{document.getElementById("recipeGrid").innerHTML='<div class="loading">Fehler beim Laden: '+e.message+'</div>';});
</script>
</body>
</html><!DOCTYPE html><html><head><meta charset="UTF-8"><title>Georg & Katja Recipes</title></head><body><h1>Setting up recipes collection...</h1><p>The full recipe collection will be available shortly.</p></body></html>
